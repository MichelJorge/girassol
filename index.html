<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌻 Um Girassol para Você</title>
  <style>
    /* ================================================
       RESET & BACKGROUND (Noite Estrelada)
    ================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: linear-gradient(to bottom, #070b19 0%, #1a2a6c 50%, #270622 100%);
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      perspective: 1000px;
    }

    /* Brilhos ao fundo */
    .stars {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
        radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
      background-size: 550px 550px, 350px 350px;
      background-position: 0 0, 40px 60px;
      opacity: 0.4;
      z-index: 1;
    }

    /* CONTAINER DO GIRASSOL */
    .sunflower-container {
      position: relative;
      width: 200px;
      height: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      bottom: 20px;
    }

    /* ================================================
       1. CAULE (CRESCIMENTO)
    ================================================ */
    .stem {
      position: absolute;
      bottom: 0;
      width: 8px;
      height: 300px;
      background: linear-gradient(to top, #2d6a4f, #52b788);
      border-radius: 4px;
      transform-origin: bottom center;
      transform: scaleY(0);
      animation: growStem 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes growStem {
      to { transform: scaleY(1); }
    }

    /* ================================================
       2. FOLHAS LATERAIS
    ================================================ */
    .leaf {
      position: absolute;
      width: 40px;
      height: 25px;
      background: #40916c;
      border-radius: 0 20px 0 20px;
      transform-origin: bottom left;
      transform: scale(0);
    }
    
    .leaf.left {
      left: -32px;
      bottom: 120px;
      transform: rotate(-30deg) scale(0);
      animation: growLeafLeft 1.5s 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .leaf.right {
      right: -32px;
      bottom: 180px;
      transform: rotate(30deg) scale(0) scaleX(-1);
      transform-origin: bottom right;
      animation: growLeafRight 1.5s 2.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes growLeafLeft { to { transform: rotate(-30deg) scale(1); } }
    @keyframes growLeafRight { to { transform: rotate(30deg) scale(1) scaleX(-1); } }

    /* ================================================
       3. A FLOR (CABEÇA DO GIRASSOL)
    ================================================ */
    .flower-head {
      position: absolute;
      bottom: 290px; /* Topo do caule */
      width: 120px;
      height: 120px;
      transform: scale(0) rotate(-45deg);
      transform-origin: center center;
      animation: popFlower 2.5s 3.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popFlower {
      to { transform: scale(1) rotate(0deg); }
    }

    /* Miolo marrom */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 55px;
      height: 55px;
      background: radial-gradient(circle, #43281c 0%, #2f1e16 100%);
      border: 3px solid #6f4e37;
      border-radius: 50%;
      z-index: 10;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
    }

    /* Pétalas Amarelas */
    .petals-container {
      position: relative;
      width: 100%;
      height: 100%;
      animation: spinFlower 20s linear infinite 6.5s;
    }

    @keyframes spinFlower {
      100% { transform: rotate(360deg); }
    }

    .petal {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 22px;
      height: 55px;
      background: linear-gradient(to top, #ffb703, #ffb703, #ffeb3b);
      border-radius: 50% 50% 20% 20%;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transform-origin: bottom center;
    }

    /* ================================================
       4. TEXTO ROMÂNTICO
    ================================================ */
    .message {
      position: fixed;
      top: 15%;
      font-family: 'Segoe UI', Roboto, sans-serif;
      color: #fff;
      font-size: 1.5rem;
      font-weight: bold;
      text-align: center;
      text-shadow: 0 0 15px rgba(255, 235, 59, 0.6);
      opacity: 0;
      transform: translateY(-20px);
      animation: showMessage 2s 5.5s forwards;
      padding: 0 20px;
    }

    @keyframes showMessage {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="stars"></div>

  <div class="message">
    Igual ao girassol busca a luz do sol,<br>meu mundo fica mais bonito com você. 🌻
  </div>

  <div class="sunflower-container">
    <div class="flower-head">
      <div class="center"></div>
      <div class="petals-container" id="petals-box">
        </div>
    </div>
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
  </div>

  <script>
    // Gerador de pétalas para não encher o HTML de divs repetidas
    const petalsBox = document.getElementById('petals-box');
    const totalPetals = 18; // Quantidade de pétalas do girassol

    for (let i = 0; i < totalPetals; i++) {
      const petal = document.createElement('div');
      petal.classList.add('petal');
      
      // Calcula o ângulo exato de rotação de cada pétala
      const angle = (360 / totalPetals) * i;
      
      // Aplica a rotação e move a pétala ligeiramente para fora do centro
      petal.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
      
      petalsBox.appendChild(petal);
    }
  </script>
</body>
</html>
