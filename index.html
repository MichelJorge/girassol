<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌻 Um Girassol sob a Noite Estrelada</title>
  <style>
    /* ================================================
       RESET & VAN GOGH BASE
    ================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: #0a1628; /* Azul noturno profundo */
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      perspective: 1000px;
    }

    /* Tela de pintura digital para os redemoinhos e estrelas */
    #vangogh-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* CONTAINER DO GIRASSOL */
    .sunflower-container {
      position: relative;
      width: 200px;
      height: 450px;
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      bottom: 20px;
    }

    /* ================================================
       1. CAULE & FOLHAS (SOMBRAS NATURAIS)
    ================================================ */
    .stem {
      position: absolute;
      bottom: 0;
      width: 10px;
      height: 300px;
      /* Gradiente mais rico simulando luz e sombra */
      background: linear-gradient(to right, #1b4332 0%, #2d6a4f 40%, #52b788 100%);
      border-radius: 5px;
      transform-origin: bottom center;
      transform: scaleY(0);
      box-shadow: -2px 0 10px rgba(0, 0, 0, 0.4);
      animation: growStem 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes growStem { to { transform: scaleY(1); } }

    .leaf {
      position: absolute;
      width: 45px;
      height: 30px;
      background: linear-gradient(135deg, #2d6a4f, #1b4332);
      border-radius: 0 25px 0 25px;
      transform-origin: bottom left;
      transform: scale(0);
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
    }
    
    .leaf.left {
      left: -35px;
      bottom: 120px;
      transform: rotate(-25deg) scale(0);
      animation: growLeafLeft 1.5s 2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .leaf.right {
      right: -35px;
      bottom: 170px;
      background: linear-gradient(225deg, #40916c, #2d6a4f);
      transform: rotate(25deg) scale(0) scaleX(-1);
      transform-origin: bottom right;
      animation: growLeafRight 1.5s 2.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    @keyframes growLeafLeft { to { transform: rotate(-25deg) scale(1); } }
    @keyframes growLeafRight { to { transform: rotate(25deg) scale(1) scaleX(-1); } }

    /* ================================================
       2. CABEÇA DO GIRASSOL (20 PÉTALAS & PROFUNDIDADE)
    ================================================ */
    .flower-head {
      position: absolute;
      bottom: 290px;
      width: 140px;
      height: 140px;
      transform: scale(0) rotate(-45deg);
      transform-origin: center center;
      animation: popFlower 2.5s 3.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popFlower { to { transform: scale(1) rotate(0deg); } }

    /* Miolo realista com textura interna */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 65px;
      height: 65px;
      background: radial-gradient(circle, #271306 0%, #43281c 70%, #6f4e37 100%);
      border: 2px solid #1a0f08;
      border-radius: 50%;
      z-index: 10;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.85), 2px 4px 10px rgba(0,0,0,0.4);
    }

    .petals-container {
      position: relative;
      width: 100%;
      height: 100%;
      animation: spinFlower 25s linear infinite 6.5s;
    }

    @keyframes spinFlower { 100% { transform: rotate(360deg); } }

    /* Pétalas estilo Van Gogh (Camadas com tons dourados) */
    .petal {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 24px;
      height: 65px;
      /* Amarelo vibrante com degradê para o dourado quente e laranja na base */
      background: linear-gradient(to top, #e65c00, #ff9f00, #ffcc00, #ffeb3b);
      border-radius: 50% 50% 25% 25%;
      box-shadow: 1px 3px 5px rgba(0,0,0,0.25);
      transform-origin: bottom center;
    }

    /* Segunda camada de pétalas para dar volume */
    .petal.back-layer {
      height: 70px;
      width: 22px;
      background: linear-gradient(to top, #d45000, #e69500, #ffaa00);
      filter: brightness(0.85);
      z-index: -1;
    }

    /* ================================================
       3. MENSAGEM DOURADA
    ================================================ */
    .message {
      position: fixed;
      top: 15%;
      font-family: 'Georgia', serif; /* Fonte clássica combinando com arte */
      font-style: italic;
      color: #ffcc00; /* Dourado quente */
      font-size: 1.6rem;
      text-align: center;
      text-shadow: 0 0 20px rgba(255, 159, 0, 0.7), 2px 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(-20px);
      animation: showMessage 2.5s 5.5s forwards;
      padding: 0 20px;
      z-index: 5;
    }

    @keyframes showMessage { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <canvas id="vangogh-canvas"></canvas>

  <div class="message">
    "Eu estou sempre fazendo aquilo que não sou capaz,<br>numa tentativa de aprender como fazê-lo." 🌻
  </div>

  <div class="sunflower-container">
    <div class="flower-head">
      <div class="center"></div>
      <div class="petals-container" id="petals-box"></div>
    </div>
    <div class="stem"></div>
    <div class="leaf left"></div>
    <div class="leaf right"></div>
  </div>

  <script>
    /* ================================================
   GERADOR DE PÉTALAS REFORÇADO (3 Camadas Volumosas)
================================================ */
const petalsBox = document.getElementById('petals-box');
const totalPetals = 20; // 20 pétalas por camada = 60 pétalas no total!

for (let layer = 0; layer < 3; layer++) {
  for (let i = 0; i < totalPetals; i++) {
    const petal = document.createElement('div');
    petal.classList.add('petal');
    
    // Identifica as camadas para o CSS aplicar tamanhos diferentes
    if (layer === 1) petal.classList.add('mid-layer');
    if (layer === 2) petal.classList.add('back-layer');
    
    // Intercala o ângulo de cada camada para que uma pétala não fique exatamente atrás da outra
    // Camada 0: deslocamento 0 | Camada 1: deslocamento de metade do vão | Camada 2: deslocamento de um terço
    const angleOffset = (360 / totalPetals) * (layer / 3);
    const angle = (360 / totalPetals) * i + angleOffset;
    
    petal.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
    petalsBox.appendChild(petal);
  }
}

    /* ================================================
       CANVAS: FUNDO ANIMADO ESTILO VAN GOGH
    ================================================ */
    const canvas = document.getElementById('vangogh-canvas');
    const ctx = canvas.getContext('2d');

    let animationFrameId;
    let time = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    // Configuração das Estrelas Pulsantes
    const starPositions = [
      {x: 0.15, y: 0.25, r: 25, baseR: 25, speed: 0.03},
      {x: 0.35, y: 0.15, r: 18, baseR: 18, speed: 0.02},
      {x: 0.75, y: 0.30, r: 22, baseR: 22, speed: 0.04},
      {x: 0.90, y: 0.45, r: 15, baseR: 15, speed: 0.025},
      {x: 0.55, y: 0.40, r: 12, baseR: 12, speed: 0.035}
    ];

    function drawVanGoghBackground() {
      time += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // 1. Degradê de Fundo Texturizado (Pinceladas horizontais)
      let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#060d1a');
      grad.addColorStop(0.5, '#122548');
      grad.addColorStop(1, '#1e122a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Efeito de pinceladas estáticas no fundo
      ctx.strokeStyle = 'rgba(26, 47, 94, 0.15)';
      ctx.lineWidth = 3;
      for (let i = 0; i < canvas.height; i += 8) {
        ctx.beginPath();
        ctx.moveTo(0, i + Math.sin(i) * 5);
        ctx.lineTo(canvas.width, i + Math.cos(i) * 5);
        ctx.stroke();
      }

      // 2. Os Redemoinhos em Espiral Fluidos (Centro da Tela)
      ctx.lineWidth = 4;
      let centerX = canvas.width * 0.5;
      let centerY = canvas.height * 0.35;
      
      function drawSwirl(cx, cy, scale, direction) {
        ctx.save();
        ctx.translate(cx, cy);
        
        // Pinceladas do redemoinho (Vários tons de azul e celeste)
        const colors = ['#1a3d7c', '#2a5eb2', '#4a8add', '#87bfff', '#ffeb3b'];
        
        colors.forEach((color, idx) => {
          ctx.strokeStyle = color;
          // Altera a opacidade dinamicamente com base na cor
          ctx.globalAlpha = color === '#ffeb3b' ? 0.08 : 0.35; 
          
          ctx.beginPath();
          for (let angle = 0; angle < Math.PI * 4; angle += 0.05) {
            // Equação da espiral de Arquimedes modificada pelo tempo
            let r = (angle * 12 * scale) + (idx * 4);
            let x = Math.cos(angle * direction + time + (idx * 0.1)) * r;
            let y = Math.sin(angle * direction + time + (idx * 0.1)) * r * 0.6; // Espiral achatada
            
            if (angle === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        });
        ctx.restore();
      }

      // Renderiza o grande fluxo de vento central
      drawSwirl(centerX - 80, centerY, 1.2, 1);
      drawSwirl(centerX + 120, centerY - 20, 0.9, -1);

      // 3. Estrelas com Auréola/Halo Irradiado
      starPositions.forEach(star => {
        let x = star.x * canvas.width;
        let y = star.y * canvas.height;
        // Efeito pulsante suave
        let pulse = Math.sin(time * 50 * star.speed) * 4;
        let currentR = star.baseR + pulse;

        // Desenha o Halo de luz (pinceladas radiais ao redor da estrela)
        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2.5;
        for (let r = currentR + 5; r < currentR + 35; r += 8) {
          ctx.setLineDash([4, 6]); // Linhas tracejadas simulando as pinceladas
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        // Núcleo brilhante da Estrela
        let starGrad = ctx.createRadialGradient(x, y, 2, x, y, currentR);
        starGrad.addColorStop(0, '#ffffff');
        starGrad.addColorStop(0.3, '#ffeb3b');
        starGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = starGrad;
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(x, y, currentR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      // 4. A Grande Lua Crescente com Halo Dourado (Canto Superior Direito)
      let moonX = canvas.width * 0.85;
      let moonY = canvas.height * 0.18;
      let moonR = 45;

      ctx.save();
      // Halo da lua
      ctx.globalAlpha = 0.15;
      let moonHalo = ctx.createRadialGradient(moonX, moonY, moonR, moonX, moonY, moonR + 50);
      moonHalo.addColorStop(0, '#ff9f00');
      moonHalo.addColorStop(0.5, '#ffcc00');
      moonHalo.addColorStop(1, 'transparent');
      ctx.fillStyle = moonHalo;
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR + 50, 0, Math.PI * 2);
      ctx.fill();

      // Desenho do corte da lua crescente perfeita
      ctx.globalAlpha = 1;
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      
      // Sombra para recortar a lua e torná-la minguante/crescente
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(moonX - 15, moonY - 5, moonR - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      animationFrameId = requestAnimationFrame(drawVanGoghBackground);
    }

    // Inicia o loop da pintura animada
    drawVanGoghBackground();
  </script>
</body>
</html>
