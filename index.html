<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Um Recado Especial para Nicolly</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Lexend:wght@400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: radial-gradient(circle at center, #1b365d 0%, #081125 100%);
            font-family: 'Lexend', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Estrelas brilhantes ao fundo */
        .stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at 20% 30%, #fff 1px, transparent 1px),
                radial-gradient(circle at 75% 15%, #fff 2px, transparent 2px),
                radial-gradient(circle at 50% 60%, #fff 1px, transparent 1px),
                radial-gradient(circle at 85% 80%, #fff 1px, transparent 1px),
                radial-gradient(circle at 10% 70%, #fff 2px, transparent 2px);
            background-size: 200px 200px;
            animation: twinkle 4s infinite linear;
            opacity: 0.6;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }

        /* Balões flutuantes estilo Up - Altas Aventuras */
        .balloon-container {
            position: absolute;
            bottom: -100px; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none;
        }

        .balloon {
            position: absolute;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            animation: floatUp 8s infinite ease-in-out;
            opacity: 0.8;
        }

        .balloon::after {
            content: ""; position: absolute; bottom: -8px; left: 50%;
            transform: translateX(-50%);
            border-left: 4px solid transparent;
            border-right: 4px solid transparent;
            border-bottom: 8px solid rgba(255,255,255,0.4);
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5) rotate(0deg); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-120px) scale(1) rotate(15deg); opacity: 0; }
        }

        /* Card Mágico Translúcido */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 30px;
            width: 90%; max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.1);
            position: relative; z-index: 10;
            transform: translateY(30px); opacity: 0;
            animation: cardAppear 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes cardAppear {
            to { transform: translateY(0); opacity: 1; }
        }

        /* Brilho neon colorido giratório nas bordas */
        .card::before {
            content: ''; position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            background: linear-gradient(45deg, #ff4b2b, #ff416c, #a8ff78, #78ffd6, #00c6ff, #0072ff);
            border-radius: 35px; z-index: -1; background-size: 400%;
            animation: magicGlow 12s linear infinite; opacity: 0.4; filter: blur(10px);
        }

        @keyframes magicGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Título Estilo Logo Pixar/Disney 3D */
        h1 {
            font-family: 'Fredoka One', cursive;
            font-size: 45px; color: #fff;
            text-shadow: 0 2px 0 #0056b3, 0 4px 0 #004085, 0 6px 0 #002752, 0 8px 15px rgba(0,0,0,0.6);
            letter-spacing: 2px; margin-bottom: 25px;
            animation: popIn 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.3s forwards;
            opacity: 0; transform: scale(0.7);
        }

        @keyframes popIn {
            to { opacity: 1; transform: scale(1); }
        }

        /* Estilização dos Textos e Transições */
        p {
            font-size: 18px; line-height: 1.6; color: #f0f3f8; margin-bottom: 20px;
            opacity: 0; transform: translateY(20px);
            animation: fadeInUp 0.8s ease forwards 0.8s;
        }

        .highlight-miss {
            color: #ffde6a; font-weight: 600; display: inline-block;
            animation: pulse 2s infinite;
        }

        .highlight-chatice {
            background: rgba(255, 75, 108, 0.2); border: 1px dashed #ff4b6c;
            padding: 2px 8px; border-radius: 10px; color: #ff758f; font-style: italic;
        }

        .highlight-bless { color: #a8ff78; font-weight: 600; }

        .highlight-success {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(to right, #78ffd6, #a8ff78);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            font-size: 22px; display: inline-block; margin: 10px 0;
        }

        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        /* Botão Interativo com Efeito Mágico */
        .btn-magic {
            background: linear-gradient(135deg, #ff416c 0%, #ff4b2b 100%);
            border: none; padding: 12px 30px; border-radius: 50px;
            color: white; font-family: 'Fredoka One', cursive; font-size: 16px;
            cursor: pointer; box-shadow: 0 10px 20px rgba(255, 65, 108, 0.4);
            transition: all 0.3s ease; margin-top: 15px;
            opacity: 0; animation: fadeInUp 0.8s ease forwards 1.2s;
        }

        .btn-magic:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 25px rgba(255, 65, 108, 0.6);
        }

        /* Estrelinhas cintilantes da Disney */
        .sparkle {
            position: absolute; background: white; width: 4px; height: 4px; border-radius: 50%;
            box-shadow: 0 0 10px 2px #fff; animation: flash 1.5s infinite alternate;
        }
        @keyframes flash { 0% { opacity: 0.2; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.5); } }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="balloon-container" id="balloons"></div>

    <div class="card">
        <div class="sparkle" style="top: 15%; left: 10%;"></div>
        <div class="sparkle" style="top: 80%; right: 12%; animation-delay: 0.5s;"></div>
        <div class="sparkle" style="top: 40%; right: 5%; animation-delay: 0.8s;"></div>

        <h1>Nicolly!</h1>
        
        <p>Estou com <span class="highlight-miss">muitas saudades</span> de você, sua <span class="highlight-chatice">chatice</span>! 🤪</p>
        <p>Que <span class="highlight-bless">Deus te abençoe muito</span> nesta sua caminhada e na sua vida!</p>
        <p>Desejo <span class="highlight-success">MUITO SUCESSO</span> em tudo o que fizer!</p>
        <p style="font-weight: 600; color: #ff758f;">Te adoro viu! ✨💙</p>

        <button class="btn-magic" onclick="createBurst()">Receber Abraço Mágico</button>
    </div>

    <script>
        // Gerador automático de Balões Flutuantes (Estilo Pixar)
        const colors = ['#ff4b6c', '#ffbe0b', '#fb5607', '#ff006e', '#3a86ff', '#8338ec', '#06d6a0'];
        const container = document.getElementById('balloons');

        function generateBalloons() {
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const balloon = document.createElement('div');
                    balloon.classList.add('balloon');
                    const size = Math.floor(Math.random() * 30) + 20; 
                    const left = Math.floor(Math.random() * 100);
                    const delay = Math.random() * 5;
                    const duration = Math.random() * 4 + 6;
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    balloon.style.width = `${size}px`;
                    balloon.style.height = `${size * 1.2}px`;
                    balloon.style.left = `${left}%`;
                    balloon.style.backgroundColor = color;
                    balloon.style.boxShadow = `inset -5px -5px 10px rgba(0,0,0,0.2), 0 5px 10px rgba(0,0,0,0.3)`;
                    balloon.style.animationDelay = `${delay}s`;
                    balloon.style.animationDuration = `${duration}s`;
                    container.appendChild(balloon);
                    setTimeout(() => balloon.remove(), (duration + delay) * 1000);
                }, i * 300);
            }
        }
        generateBalloons();
        setInterval(generateBalloons, 10000);

        // Efeito de partículas ao clicar no botão
        function createBurst() {
            for (let i = 0; i < 30; i++) {
                const p = document.createElement('div');
                p.style.position = 'absolute'; p.style.width = '8px'; p.style.height = '8px'; p.style.borderRadius = '50%';
                p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                p.style.left = '50%'; p.style.top = '50%'; p.style.zIndex = '100'; p.style.pointerEvents = 'none';
                
                const angle = Math.random() * Math.PI * 2;
                const vel = Math.random() * 150 + 50;
                const x = Math.cos(angle) * vel; const y = Math.sin(angle) * vel;
                document.body.appendChild(p);

                p.animate([
                    { transform: 'translate(-50%, -50%) scale(1)', opacity: 1 },
                    { transform: `translate(calc(-50% + ${x}px), calc(-50% + ${y}px)) scale(0)`, opacity: 0 }
                ], { duration: 1000, easing: 'cubic-bezier(0.1, 0.8, 0.3, 1)', fill: 'forwards' });
                setTimeout(() => p.remove(), 1000);
            }
        }
    </script>
</body>
</html>
