<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🌻 Um Girassol sob a Noite Estrelada</title>
  <style>
    /* ================================================
       RESET & VAN GOGH BASE
    ================================================ */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      min-height: 100vh;
      background: #0a1628; 
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: flex-end;
      perspective: 1000px;
    }

    #vangogh-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
    }

    /* CONTAINER DO GIRASSOL AMPLIADO */
    .sunflower-container {
      position: relative;
      width: 250px;
      height: 550px; /* Aumentado para suportar o girassol maior */
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 2;
      bottom: 20px;
    }

    /* ================================================
       1. CAULE AMPLIADO
    ================================================ */
    .stem {
      position: absolute;
      bottom: 0;
      width: 14px; /* Mais grosso para aguentar o peso da flor */
      height: 380px; /* Mais alto */
      background: linear-gradient(to right, #1b4332 0%, #2d6a4f 40%, #52b788 100%);
      border-radius: 7px;
      transform-origin: bottom center;
      transform: scaleY(0);
      box-shadow: -2px 0 12px rgba(0, 0, 0, 0.4);
      animation: growStem 4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes growStem { to { transform: scaleY(1); } }

    /* ================================================
       2. ARRANJO DE MULTIPLAS FOLHAS (6 FOLHAS)
    ================================================ */
    .leaf {
      position: absolute;
      width: 55px; /* Folhas maiores */
      height: 35px;
      background: linear-gradient(135deg, #2d6a4f, #1b4332);
      border-radius: 0 30px 0 30px;
      transform: scale(0);
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }

    /* Configuração e tempo de broto para cada folha lateral */
    .leaf.left-1 { left: -42px; bottom: 90px; transform-origin: bottom right; animation: growLeafLeft 1.2s 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .leaf.right-1 { right: -42px; bottom: 140px; transform-origin: bottom left; transform: scaleX(-1); animation: growLeafRight 1.2s 1.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    .leaf.left-2 { left: -42px; bottom: 200px; transform-origin: bottom right; animation: growLeafLeft 1.2s 2.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .leaf.right-2 { right: -42px; bottom: 250px; transform-origin: bottom left; transform: scaleX(-1); animation: growLeafRight 1.2s 2.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    
    .leaf.left-3 { left: -40px; bottom: 300px; width: 45px; height: 28px; transform-origin: bottom right; animation: growLeafLeft 1.2s 3.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    .leaf.right-3 { right: -40px; bottom: 330px; width: 45px; height: 28px; transform-origin: bottom left; transform: scaleX(-1); animation: growLeafRight 1.2s 3.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

    @keyframes growLeafLeft { to { transform: rotate(-22deg) scale(1); } }
    @keyframes growLeafRight { to { transform: rotate(22deg) scale(1) scaleX(-1); } }

    /* ================================================
       3. CABEÇA DO GIRASSOL GIGANTE
    ================================================ */
    .flower-head {
      position: absolute;
      bottom: 365px; /* Alinhado ao novo topo do caule */
      width: 180px;  /* Aumentado de 140px para 180px */
      height: 180px; /* Aumentado de 140px para 180px */
      transform: scale(0) rotate(-45deg);
      transform-origin: center center;
      animation: popFlower 2.5s 3.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes popFlower { to { transform: scale(1) rotate(0deg); } }

    /* Miolo imponente e robusto */
    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 85px; /* Miolo maior e proporcional */
      height: 85px;
      background: radial-gradient(circle, #210f04 0%, #3a2218 65%, #5c3e29 100%);
      border: 3px solid #140a04;
      border-radius: 50%;
      z-index: 10;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.9), 2px 4px 14px rgba(0,0,0,0.5);
    }

    .petals-container {
      position: relative;
      width: 100%;
      height: 100%;
      animation: spinFlower 28s linear infinite 6.5s;
    }

    @keyframes spinFlower { 100% { transform: rotate(360deg); } }

    /* PÉTALAS MAIORES E MAIS LARGAS */
    .petal {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 32px;  /* Mais largas para fechar os vãos */
      height: 95px; /* Mais compridas */
      background: linear-gradient(to top, #e65c00 0%, #ff9f00 25%, #ffcc00 60%, #ffeb3b 100%);
      border-radius: 50% 50% 35% 35%;
      box-shadow: 1px 3px 6px rgba(0,0,0,0.25);
      transform-origin: bottom center;
      z-index: 3;
    }

    .petal.mid-layer {
      width: 34px;
      height: 105px;
      background: linear-gradient(to top, #d45000 0%, #ff9200 30%, #ffbb00 100%);
      filter: brightness(0.92);
      z-index: 2;
    }

    .petal.back-layer {
      width: 36px;
      height: 115px;
      background: linear-gradient(to top, #b83f00 0%, #e68500 40%, #ffa500 100%);
      filter: brightness(0.78) drop-shadow(0px 4px 8px rgba(0,0,0,0.4));
      z-index: 1;
    }

    /* ================================================
       4. MENSAGEM DOURADA
    ================================================ */
    .message {
      position: fixed;
      top: 12%;
      font-family: 'Georgia', serif;
      font-style: italic;
      color: #ffcc00;
      font-size: 1.6rem;
      text-align: center;
      text-shadow: 0 0 20px rgba(255, 159, 0, 0.7), 2px 2px 4px rgba(0,0,0,0.8);
      opacity: 0;
      transform: translateY(-20px);
      animation: showMessage 2.5s 5.5s forwards;
      padding: 0 20px;
      z-index: 5;
    }

    @keyframes showMessage { to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <canvas id="vangogh-canvas"></canvas>

  <div class="message">
    "Ache belo tudo que puder,<br>Vincent Van Gogh." 🌻
  </div>

  <div class="sunflower-container">
    <div class="flower-head">
      <div class="center"></div>
      <div class="petals-container" id="petals-box"></div>
    </div>
    <div class="stem"></div>
    
    <div class="leaf left-1"></div>
    <div class="leaf right-1"></div>
    <div class="leaf left-2"></div>
    <div class="leaf right-2"></div>
    <div class="leaf left-3"></div>
    <div class="leaf right-3"></div>
  </div>

  <script>
    /* ================================================
       GERADOR DE PÉTALAS EM 3 CAMADAS (60 PÉTALAS)
    ================================================ */
    const petalsBox = document.getElementById('petals-box');
    const totalPetals = 20; 

    for (let layer = 0; layer < 3; layer++) {
      for (let i = 0; i < totalPetals; i++) {
        const petal = document.createElement('div');
        petal.classList.add('petal');
        
        if (layer === 1) petal.classList.add('mid-layer');
        if (layer === 2) petal.classList.add('back-layer');
        
        // Intercala os ângulos perfeitamente entre as camadas
        const angleOffset = (360 / totalPetals) * (layer / 3);
        const angle = (360 / totalPetals) * i + angleOffset;
        
        petal.style.transform = `translate(-50%, -100%) rotate(${angle}deg)`;
        petalsBox.appendChild(petal);
      }
    }

    /* ================================================
       CANVAS: FUNDO ANIMADO ESTILO VAN GOGH
    ================================================ */
    const canvas = document.getElementById('vangogh-canvas');
    const ctx = canvas.getContext('2d');

    let animationFrameId;
    let time = 0;

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    const starPositions = [
      {x: 0.15, y: 0.25, r: 25, baseR: 25, speed: 0.03},
      {x: 0.35, y: 0.15, r: 18, baseR: 18, speed: 0.02},
      {x: 0.75, y: 0.30, r: 22, baseR: 22, speed: 0.04},
      {x: 0.90, y: 0.45, r: 15, baseR: 15, speed: 0.025},
      {x: 0.55, y: 0.40, r: 12, baseR: 12, speed: 0.035}
    ];

    function drawVanGoghBackground() {
      time += 0.01;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      let grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, '#060d1a');
      grad.addColorStop(0.5, '#122548');
      grad.addColorStop(1, '#1e122a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.strokeStyle = 'rgba(26, 47, 94, 0.15)';
      ctx.lineWidth = 3;
      for (let i = 0; i < canvas.height; i += 8) {
        ctx.beginPath();
        ctx.moveTo(0, i + Math.sin(i) * 5);
        ctx.lineTo(canvas.width, i + Math.cos(i) * 5);
        ctx.stroke();
      }

      ctx.lineWidth = 4;
      let centerX = canvas.width * 0.5;
      let centerY = canvas.height * 0.35;
      
      function drawSwirl(cx, cy, scale, direction) {
        ctx.save();
        ctx.translate(cx, cy);
        const colors = ['#1a3d7c', '#2a5eb2', '#4a8add', '#87bfff', '#ffeb3b'];
        
        colors.forEach((color, idx) => {
          ctx.strokeStyle = color;
          ctx.globalAlpha = color === '#ffeb3b' ? 0.08 : 0.35; 
          
          ctx.beginPath();
          for (let angle = 0; angle < Math.PI * 4; angle += 0.05) {
            let r = (angle * 12 * scale) + (idx * 4);
            let x = Math.cos(angle * direction + time + (idx * 0.1)) * r;
            let y = Math.sin(angle * direction + time + (idx * 0.1)) * r * 0.6;
            
            if (angle === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.stroke();
        });
        ctx.restore();
      }

      drawSwirl(centerX - 80, centerY, 1.2, 1);
      drawSwirl(centerX + 120, centerY - 20, 0.9, -1);

      starPositions.forEach(star => {
        let x = star.x * canvas.width;
        let y = star.y * canvas.height;
        let pulse = Math.sin(time * 50 * star.speed) * 4;
        let currentR = star.baseR + pulse;

        ctx.save();
        ctx.globalAlpha = 0.25;
        ctx.strokeStyle = '#ffcc00';
        ctx.lineWidth = 2.5;
        for (let r = currentR + 5; r < currentR + 35; r += 8) {
          ctx.setLineDash([4, 6]);
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.stroke();
        }
        
        let starGrad = ctx.createRadialGradient(x, y, 2, x, y, currentR);
        starGrad.addColorStop(0, '#ffffff');
        starGrad.addColorStop(0.3, '#ffeb3b');
        starGrad.addColorStop(1, 'transparent');
        ctx.fillStyle = starGrad;
        ctx.globalAlpha = 1;
        ctx.beginPath();
        ctx.arc(x, y, currentR, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });

      let moonX = canvas.width * 0.85;
      let moonY = canvas.height * 0.18;
      let moonR = 45;

      ctx.save();
      ctx.globalAlpha = 0.15;
      let moonHalo = ctx.createRadialGradient(moonX, moonY, moonR, moonX, moonY, moonR + 50);
      moonHalo.addColorStop(0, '#ff9f00');
      moonHalo.addColorStop(0.5, '#ffcc00');
      moonHalo.addColorStop(1, 'transparent');
      ctx.fillStyle = moonHalo;
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR + 50, 0, Math.PI * 2);
      ctx.fill();

      ctx.globalAlpha = 1;
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 20;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
      ctx.fill();
      
      ctx.shadowBlur = 0;
      ctx.globalCompositeOperation = 'destination-out';
      ctx.beginPath();
      ctx.arc(moonX - 15, moonY - 5, moonR - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();

      animationFrameId = requestAnimationFrame(drawVanGoghBackground);
    }

    drawVanGoghBackground();
  </script>
</body>
</html>
